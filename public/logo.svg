<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80">
  <defs>
    <style>
      .bg { fill: transparent; }
      .text-2026 {
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        font-weight: 700;
        font-size: 42px;
        fill: #C6A875;
        letter-spacing: -1px;
      }
      .text-sales {
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        font-weight: 300;
        font-size: 20px;
        fill: #1A2640;
        letter-spacing: 4px;
      }
      .accent-line {
        stroke: #C6A875;
        stroke-width: 2;
      }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg"/>

  <g transform="translate(10, 20)">
    <rect x="0" y="0" width="16" height="40" fill="#1A2640" />
    <rect x="22" y="15" width="16" height="25" fill="#C6A875" />
    <circle cx="30" cy="5" r="5" fill="#1A2640" />
  </g>

  <text x="65" y="48" class="text-2026">2026</text>
  <text x="165" y="45" class="text-sales">SALES</text>

  <line x1="65" y1="58" x2="260" y2="58" class="accent-line" />
</svg>
