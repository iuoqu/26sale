<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<title>2026 Sales</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }
  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }
  .logo-container {
    width: 100%;
    max-width: 240px;
    display: flex;
    justify-content: center;
  }
  .logo-container svg {
    max-width: 200px;
    height: auto;
  }
  .field {
    width: 100%;
    max-width: 240px;
  }
  input[type="password"] {
    width: 100%;
    padding: 14px 16px;
    font-size: 16px;
    border: 1px solid #e0e0e0;
    border-radius: 4px;
    outline: none;
    text-align: center;
    letter-spacing: 2px;
    background: #fafafa;
    transition: border-color 0.2s;
  }
  input[type="password"]:focus {
    border-color: #1a1a2e;
    background: #fff;
  }
  input[type="password"].error {
    border-color: #c0392b;
    animation: shake 0.3s;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
</style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80">
        <defs>
          <style>
            .text-2026 { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 700; font-size: 42px; fill: #C6A875; letter-spacing: -1px; }
            .text-sales { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 300; font-size: 20px; fill: #1A2640; letter-spacing: 4px; }
            .accent-line { stroke: #C6A875; stroke-width: 2; }
          </style>
        </defs>
        <g transform="translate(10, 20)">
          <rect x="0" y="0" width="16" height="40" fill="#1A2640" />
          <rect x="22" y="15" width="16" height="25" fill="#C6A875" />
          <circle cx="30" cy="5" r="5" fill="#1A2640" />
        </g>
        <text x="65" y="48" class="text-2026">2026</text>
        <text x="165" y="45" class="text-sales">SALES</text>
        <line x1="65" y1="58" x2="260" y2="58" class="accent-line" />
      </svg>
    </div>
    <div class="field">
      <input type="password" id="pwd" autocomplete="off" autofocus placeholder="Password">
    </div>
  </div>
<script>
  const CORRECT = 'kc2026';
  const input = document.getElementById('pwd');
  input.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (input.value === CORRECT) {
      sessionStorage.setItem('authenticated', 'true');
      window.location.href = 'product_list.html';
    } else {
      input.classList.remove('error');
      void input.offsetWidth;
      input.classList.add('error');
      input.select();
    }
  });
</script>
</body>
</html>
